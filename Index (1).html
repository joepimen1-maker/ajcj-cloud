<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJCJ Cloud - Visual AI Organizer v4.6</title>
    <style>
        :root { --primary: #FFD700; --bg: #0d0d0d; --card: rgba(26, 26, 26, 0.85); --text: #e0e0e0; }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        
        .app-container { width: 100%; max-width: 600px; min-height: 100vh; background: #111; padding: 20px; box-sizing: border-box; border-left: 1px solid #333; border-right: 1px solid #333; position: relative; overflow-x: hidden; }

        /* Pantallas */
        .screen { display: none; position: relative; z-index: 2; }
        .active { display: block !important; }

        /* --- IMÁGENES DE FONDO --- */
        
        /* FONDO DE PORTADA (Login) */
        #login-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Imagen de fondo de neón musical impactante */
            background-image: url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=1600&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            border-radius: 0; /* Reset para pantalla completa */
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* Cuadro de Login con efecto desenfoque (Glassmorphism) - REDUCIDO */
        .login-box {
            background: rgba(17, 17, 17, 0.7);
            backdrop-filter: blur(10px);
            /* Reducción de padding interno */
            padding: 30px; 
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 100%;
            /* Ajuste de ancho máximo para un look más compacto */
            max-width: 360px; 
        }

        /* FONDO INTERIOR (Main App) */
        #main-app {
            padding-top: 20px;
            /* Imagen de fondo sutil musical */
            background-image: linear-gradient(rgba(17, 17, 17, 0.9), rgba(17, 17, 17, 0.9)), 
                              url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* --- ESTILOS COMPONENTES --- */
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; outline: none; }
        
        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); font-weight: bold; cursor: pointer; color: black; font-size: 1rem; text-transform: uppercase; margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }
        .btn-main:active { transform: scale(0.98); }
        
        .file-upload { background: rgba(26, 26, 26, 0.5); border: 2px dashed #444; padding: 30px; text-align: center; border-radius: 20px; cursor: pointer; margin: 15px 0; display: block; color: var(--primary); font-weight: bold; backdrop-filter: blur(5px); }
        
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin: 25px 0; }
        .folder { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; border-bottom: 4px solid #333; transition: 0.3s; backdrop-filter: blur(5px); }
        .folder:hover { border-color: var(--primary); background: rgba(34, 34, 34, 0.9); transform: translateY(-3px); }
        .count-badge { background: var(--primary); color: black; padding: 2px 7px; border-radius: 8px; font-size: 0.7em; font-weight: bold; }

        .song-item { background: rgba(30, 30, 30, 0.7); padding: 15px; margin: 12px 0; border-radius: 15px; border-left: 5px solid var(--primary); backdrop-filter: blur(5px); }
        audio { width: 100%; margin-top: 10px; height: 35px; filter: invert(100%); }
        .del-btn { color: #ff4d4d; background: none; border: none; font-size: 1.3rem; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-screen" class="screen active">
        <div class="login-box">
            <h1 style="color:var(--primary); font-size: 2.4rem; margin: 0;">AJCJ CLOUD</h1>
            <p style="opacity: 0.8; margin-top: 5px; font-size: 0.9rem;">Organizador Inteligente v4.6</p>
            <input type="text" id="userName" placeholder="Nombre de usuario">
            <button class="btn-main" onclick="startApp()">ACCEDER</button>
        </div>
    </div>

    <div id="main-app" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; background: rgba(17, 17, 17, 0.8); padding: 10px; border-radius: 10px;">
            <h2 id="welcomeText" style="margin:0; color:var(--primary); font-size: 1.1rem;"></h2>
            <button onclick="location.reload()" style="background:none; border:none; color:#ff4d4d; font-weight:bold; cursor:pointer;">SALIR</button>
        </div>

        <div style="background: rgba(26, 26, 26, 0.6); padding: 15px; border-radius: 20px; border: 1px solid #333; backdrop-filter: blur(10px);">
            <label class="file-upload">
                <span id="fileStatus">📁 SELECCIONAR MULTIPLES AUDIOS</span>
                <input type="file" id="audioFiles" accept="audio/*" multiple style="display:none" onchange="updateLabel(this)">
            </label>
            <button class="btn-main" onclick="uploadMultiple()">ORGANIZAR TODA MI MÚSICA</button>
        </div>

        <div class="folder-grid" id="folderGrid"></div>

        <h3 id="viewTitle" style="margin-top: 30px; border-left: 4px solid var(--primary); padding-left: 12px; background: rgba(17, 17, 17, 0.8); padding-top: 5px; padding-bottom: 5px; border-radius: 5px;">Biblioteca Global</h3>
        <div id="musicList"></div>
    </div>
</div>

<script>
    let library = [];
    const allGenres = [
        "Reguetón", "Dembow", "Dembow Cristiano", "Salsa", "Salsa Baúl", "Bachata", 
        "Vallenato", "Corridos", "Trap/Drill", "Tech House", "Deep House", 
        "Hip Hop US", "Afrobeats", "Pop Global", "Rock/Indie", "80s/90s Hits"
    ];

    const keywords = {
        "Dembow": ["jey one", "yaisel", "bo de bo", "el alfa", "chimbala", "rochy", "tokischa", "bulin", "angel dior", "flow 28", "braulio", "dembow"],
        "Dembow Cristiano": ["redimi2", "philippe", "madiel lara", "rubinsky", "ander bock", "lizzy parra"],
        "Reguetón": ["bad bunny", "karol g", "feid", "anuel", "ozuna", "j balvin", "rauw", "mora", "reggaeton", "arcangel", "chencho", "jowell"],
        "Salsa": ["marc anthony", "gilberto", "niche", "lavoe", "oscar d leon", "willie colon", "frankie ruiz", "salsa"],
        "Salsa Baúl": ["roberto antonio", "hildemaro", "porfi baloa", "adolescentes", "baul", "salsa baul"],
        "Bachata": ["romeo", "aventura", "prince royce", "bachata", "anthony santos", "zacarias", "frank reyes"],
        "Vallenato": ["diomedes", "silvestre", "vallenato", "binomio", "celedon", "nelson velasquez"],
        "Corridos": ["peso pluma", "natanael", "junior h", "fuerza regida", "corridos", "tumbados"],
        "Tech House": ["fisher", "chris lake", "paco osuna", "pawsa", "bibi", "cloonee", "tech house", "martinez brothers"],
        "Deep House": ["black coffee", "rufus", "keinemusik", "anyma", "afterlife", "deep house"],
        "Trap/Drill": ["drill", "trap", "central cee", "eladio", "luar", "bryant myers", "pop smoke", "morad"],
        "Hip Hop US": ["eminem", "drake", "kendrick", "kanye", "snoop", "travis scott", "hip hop", "tupac", "biggie"],
        "Afrobeats": ["burna boy", "wizkid", "rema", "afrobeats", "ayra starr", "tems"],
        "Rock/Indie": ["rock", "queen", "mana", "soda stereo", "artic monkeys", "nirvana", "coldplay", "linkin park"],
        "80s/90s Hits": ["disco", "funk", "michael jackson", "madonna", "retro", "80s", "90s", "classic"],
        "Pop Global": ["ed sheeran", "shakira", "rosalia", "dua lipa", "taylor", "the weeknd", "pop", "bieber", "yatra"]
    };

    function startApp() {
        const name = document.getElementById('userName').value;
        if(!name) return alert("Introduce tu nombre");
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('main-app').classList.add('active');
        document.getElementById('welcomeText').innerText = "CLOUDHUB: " + name.toUpperCase();
        renderFolders();
    }

    function updateLabel(input) {
        document.getElementById('fileStatus').innerText = `✅ ${input.files.length} ARCHIVOS LISTOS`;
    }

    function uploadMultiple() {
        const files = document.getElementById('audioFiles').files;
        if(files.length === 0) return alert("Selecciona archivos primero");

        for(let i = 0; i < files.length; i++) {
            let title = files[i].name.replace(/\.[^/.]+$/, "").replace(/[_-]/g, " ");
            let detectedGenre = "Pop Global";
            const lowerTitle = title.toLowerCase();

            for (let genre in keywords) {
                if (keywords[genre].some(k => lowerTitle.includes(k))) {
                    detectedGenre = genre;
                    break;
                }
            }

            library.push({ id: Date.now() + i, title: title, genre: detectedGenre, url: URL.createObjectURL(files[i]) });
        }

        renderFolders();
        showSongs(library, "Biblioteca Global");
        document.getElementById('fileStatus').innerText = "📁 SELECCIONAR MULTIPLES AUDIOS";
    }

    function renderFolders() {
        const grid = document.getElementById('folderGrid');
        grid.innerHTML = "";
        allGenres.forEach(g => {
            const count = library.filter(s => s.genre === g).length;
            grid.innerHTML += `<div class="folder" onclick="filterBy('${g}')"><b style="font-size:0.8rem;">📂 ${g}</b><br><span class="count-badge">${count}</span></div>`;
        });
    }

    function showSongs(list, title) {
        document.getElementById('viewTitle').innerText = title;
        const container = document.getElementById('musicList');
        container.innerHTML = list.length ? "" : "<p style='text-align:center; opacity:0.3; background: rgba(17, 17, 17, 0.7); padding: 10px; border-radius: 10px;'>Carpeta vacía</p>";
        list.forEach(s => {
            container.innerHTML += `<div class="song-item"><button class="del-btn" onclick="removeSong(${s.id})">✕</button><strong>${s.title}</strong><div style="font-size:0.8rem; color:var(--primary);">${s.genre}</div><audio controls src="${s.url}"></audio></div>`;
        });
    }

    function filterBy(g) { showSongs(library.filter(s => s.genre === g), "Carpeta: " + g); }
    function removeSong(id) { library = library.filter(s => s.id !== id); renderFolders(); showSongs(library, "Biblioteca Global"); }
</script>
</body>
</html>
