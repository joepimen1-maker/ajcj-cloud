<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJCJ Cloud - Visual AI Organizer v8.1</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #FFD700; --bg: #0d0d0d; --card: #222; --text: #e0e0e0; --danger: #ff4d4d; --success: #28a745; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 600px; min-height: 100vh; background: #111; padding: 20px; box-sizing: border-box; border-left: 1px solid #333; border-right: 1px solid #333; position: relative; }
        
        #login-screen {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80') center/cover;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 10;
        }
        .login-box { background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 85%; }
        
        #main-app {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80') center/cover fixed;
            min-height: 100vh; padding-top: 10px; display: none;
        }

        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); font-weight: bold; cursor: pointer; color: black; margin-top: 10px; font-size: 1rem; }
        
        .file-upload-box { background: rgba(26,26,26,0.6); padding: 15px; border-radius: 20px; margin-bottom: 10px; border: 1px solid #333; }
        .file-upload { display: block; text-align: center; padding: 20px; border: 2px dashed #444; border-radius: 15px; cursor: pointer; color: var(--primary); font-weight: bold; }

        .folder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .folder { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #333; position: relative; }
        .count-badge { background: var(--primary); color: black; padding: 2px 7px; border-radius: 8px; font-size: 0.7em; font-weight: bold; margin-top: 5px; display: inline-block; }
        
        h3#viewTitle { border-left: 4px solid var(--primary); padding-left: 10px; margin: 20px 0 10px 0; font-size: 1.1rem; }

        .song-item { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 15px; position: relative; border: 1px solid #333; }
        .song-title { color: white; font-weight: bold; font-size: 0.95rem; margin-bottom: 5px; display: block; padding-right: 25px; }
        
        audio { width: 100%; margin-top: 5px; filter: invert(100%); height: 35px; }
        
        .actions-box { display: flex; gap: 10px; margin-top: 10px; }
        .btn-action { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; }
        .btn-dl { background: var(--success); color: white; }
        .btn-del { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-screen">
        <div class="login-box">
            <h1 style="color:var(--primary); margin:0;">AJCJ CLOUD</h1>
            <p style="font-size:0.8rem; color:#aaa;">Visual AI Organizer v8.1</p>
            <input type="text" id="userName" placeholder="Nombre de usuario">
            <button class="btn-main" onclick="startApp()">ACCEDER</button>
        </div>
    </div>

    <div id="main-app">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h2 id="welcomeText" style="color:var(--primary); font-size: 0.9rem;"></h2>
            <button onclick="logout()" style="color:red; background:none; border:none; font-weight:bold;">SALIR</button>
        </div>

        <div class="file-upload-box">
            <label class="file-upload">
                <span id="fileStatus">📁 SUBIR MUSICA</span>
                <input type="file" id="audioFiles" accept="audio/*" multiple style="display:none" onchange="document.getElementById('fileStatus').innerText = this.files.length + ' LISTOS'">
            </label>
            <button class="btn-main" onclick="uploadToCloud()">ORGANIZAR AHORA</button>
        </div>

        <div class="folder-grid" id="folderGrid"></div>
        
        <h3 id="viewTitle">Biblioteca Global</h3>
        <div id="musicList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCEiAw70YC20T00KUwhBIIFENmHRgHAYD8",
      authDomain: "ajcj-cloud-629bf.firebaseapp.com",
      projectId: "ajcj-cloud-629bf",
      storageBucket: "ajcj-cloud-629bf.firebasestorage.app",
      messagingSenderId: "927498286564",
      appId: "1:927498286564:web:5fee7a3e4b47cbfdca43f1"
    };

    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();
    const db = firebase.database();

    let library = [];
    let currentFilteredGenre = null;
    
    // LISTA ACTUALIZADA SIN DEMBOW CRISTIANO NI CORRIDOS
    const allGenres = ["Salsa", "Salsa Baúl", "Bachata", "Vallenato", "Trap/Drill", "Tech House", "Deep House", "Hip Hop US", "Afrobeats", "Pop Global", "Rock/Indie", "80s/90s Hits"];

    const keywords = {
        "Salsa Baúl": ["baul"], "Salsa": ["salsa"],
        "Bachata": ["bachata"], "Vallenato": ["diomedes", "vallenato"],
        "Trap/Drill": ["trap", "drill"], "Tech House": ["tech"], "Deep House": ["deep"],
        "Hip Hop US": ["hiphop"], "Afrobeats": ["afro"], "Pop Global": ["pop"],
        "Rock/Indie": ["rock"], "80s/90s Hits": ["80s", "90s"]
    };

    window.onload = () => {
        const savedUser = localStorage.getItem('ajcj_user');
        if (savedUser) { document.getElementById('userName').value = savedUser; startApp(); }
    };

    function startApp() {
        const name = document.getElementById('userName').value;
        if(!name) return;
        localStorage.setItem('ajcj_user', name);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('welcomeText').innerText = "HOLA, " + name.toUpperCase();
        loadCloudData();
    }

    function logout() { localStorage.removeItem('ajcj_user'); location.reload(); }

    async function uploadToCloud() {
        const files = document.getElementById('audioFiles').files;
        if(!files.length) return;
        document.getElementById('fileStatus').innerText = "SUBIENDO...";

        for(let file of files) {
            let title = file.name.replace(/\.[^/.]+$/, "").replace(/[_-]/g, " ");
            let genre = "Pop Global";
            for (let g in keywords) { if (keywords[g].some(k => title.toLowerCase().includes(k))) { genre = g; break; } }
            
            const storageRef = storage.ref(`musica/${file.name}`);
            await storageRef.put(file);
            const url = await storageRef.getDownloadURL();
            db.ref('songs').push({ title: title, fileName: file.name, genre: genre, url: url });
        }
        document.getElementById('fileStatus').innerText = "📁 SUBIR MUSICA";
        document.getElementById('audioFiles').value = "";
    }

    function loadCloudData() {
        db.ref('songs').on('value', snapshot => {
            library = [];
            snapshot.forEach(child => { library.push({ id: child.key, ...child.val() }); });
            renderFolders();
            if(currentFilteredGenre) filterBy(currentFilteredGenre);
            else showSongs(library, "Biblioteca Global");
        });
    }

    function renderFolders() {
        const grid = document.getElementById('folderGrid');
        grid.innerHTML = "";
        allGenres.forEach(g => {
            const count = library.filter(s => s.genre === g).length;
            grid.innerHTML += `<div class="folder" onclick="filterBy('${g}')"><b>📁 ${g}</b><br><span class="count-badge">${count}</span></div>`;
        });
    }

    function showSongs(list, title) {
        document.getElementById('viewTitle').innerText = title;
        const container = document.getElementById('musicList');
        container.innerHTML = list.length ? "" : "<p style='opacity:0.3; text-align:center;'>Vacío</p>";
        list.forEach(s => {
            container.innerHTML += `
                <div class="song-item">
                    <span class="song-title">${s.title}</span>
                    <audio controls src="${s.url}"></audio>
                    <div class="actions-box">
                        <button class="btn-action btn-dl" onclick="window.open('${s.url}')">DESCARGAR</button>
                        <button class="btn-action btn-del" onclick="deleteSong('${s.id}', '${s.fileName}')">ELIMINAR</button>
                    </div>
                </div>`;
        });
    }

    function filterBy(g) { currentFilteredGenre = g; showSongs(library.filter(s => s.genre === g), "Carpeta: " + g); }

    function deleteSong(id, fileName) {
        if(!confirm("¿Eliminar canción de la nube?")) return;
        db.ref('songs/' + id).remove();
        storage.ref(`musica/${fileName}`).delete();
    }
</script>
</body>
</html>
